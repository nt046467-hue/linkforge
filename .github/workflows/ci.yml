name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate
        env:
          DATABASE_URL: "postgresql://user:password@localhost/test"
          DIRECT_URL: "postgresql://user:password@localhost/test"

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit
